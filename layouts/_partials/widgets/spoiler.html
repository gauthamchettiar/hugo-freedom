{{ $page := .page }}
{{ $class := .class | default "fr-wdgt-spoiler" }}
{{ $content := .content }}
{{ $variation := .variation | default "" }}

<label class="{{ $class }}{{ if $variation }} {{ $class }}--{{ $variation }}{{ end }}">
    <input type="checkbox" class="{{ $class }}__toggle" />
    <span class="{{ $class }}__text">{{ $content }}</span>
</label>

module:
  hugoVersion:
    extended: false
    min: "0.146.0"

markup:
  goldmark:
    extensions:
      strikethrough: false
      extras:
        delete: 
          enable: true
        insert: 
          enable: true
        mark: 
          enable: true
        subscript: 
          enable: true
        superscript: 
          enable: true
  highlight:
    noClasses: false
